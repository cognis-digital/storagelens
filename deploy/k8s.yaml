apiVersion: apps/v1
kind: Deployment
metadata: { name: storagelens, labels: { app: storagelens } }
spec:
  replicas: 1
  selector: { matchLabels: { app: storagelens } }
  template:
    metadata: { labels: { app: storagelens } }
    spec:
      containers:
        - name: storagelens
          image: ghcr.io/cognis-digital/storagelens:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: storagelens }
spec:
  selector: { app: storagelens }
  ports: [{ port: 80, targetPort: 8000 }]
